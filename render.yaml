services:
  - type: web
    name: hms
    env: python
    region: oregon
    plan: free
    buildCommand: bash render-build.sh
    startCommand: gunicorn hospital_management_system.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DEBUG
        value: "False"
      - key: PYTHONUNBUFFERED
        value: "1"
