<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        :root { color-scheme: dark; background: #070a10; color: #eef2ff; font-family: Inter, system-ui, sans-serif; }
        body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 24px; background: radial-gradient(circle at top left, rgba(95, 175, 255, 0.16), transparent 24%), #070a10; }
        .card { width: min(420px, 100%); background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.08); border-radius: 26px; padding: 32px; box-shadow: 0 30px 80px rgba(0,0,0,.18); }
        h1 { margin: 0 0 16px; font-size: clamp(2rem, 4vw, 2.5rem); }
        p { margin: 0 0 24px; color: #c4d0fb; line-height: 1.75; }
        .button { width: 100%; padding: 14px 16px; border-radius: 999px; border: none; background: #5de6b8; color: #08131d; font-weight: 700; cursor: pointer; }
        .link { display: inline-block; margin-top: 18px; color: #9ac9ff; text-decoration: none; }
    </style>
</head>
<body>
    <main class="card">
        <h1>Login</h1>
        <p>This is the login page placeholder. You can implement form handling next to support role-based login for admin, doctor, receptionist, and patient.</p>
        <button class="button">Login</button>
        <a class="link" href="/">Back to Dashboard</a>
    </main>
</body>
</html>
